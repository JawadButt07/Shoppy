version: '3.9'
services:
  db:
    image: postgres:15
    container_name: shoppy_db
    restart: always
    environment:
      POSTGRES_DB: shoppy_db
      POSTGRES_USER: shoppy_user
      POSTGRES_PASSWORD: shoppy_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  web:
    build: .
    container_name: shoppy_web
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata sample_data.json || true &&
             gunicorn ecommerce.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    environment:
      DB_NAME: shoppy_db
      DB_USER: shoppy_user
      DB_PASSWORD: shoppy_pass
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      - db
  nginx:
    image: nginx:alpine
    container_name: shoppy_nginx
    restart: always
    ports:
      - "8085:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      - web
volumes:
  postgres_data:
  media_files:
  static_files:
